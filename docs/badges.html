<!DOCTYPE html>
<html lang="en">

<head>
    <title>Badges | Tower Bootstrap Theme</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Demo of custom Bootstrap theme">
    <link href="css/tower-bootstrap-theme.min.css" rel="stylesheet" id="theme-link" />
    <style>
        .color-selector-preview {
            background: var(--twr-preview-color);
            display: inline-block;
            height: 1.25em;
            width: 1.25em;
            border-radius: .25em;
            border: 2px solid hsl(from var(--twr-preview-color) h s calc(l - 10));
            transform: translateY(2px);
        }

        .svg-icon {
            text-decoration: none;
            width: 1.2em;
            height1.2em;
            line-height: 0.75em;
            margin: -0.15em 0.1em 0 0.1em;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
    <script src="scripts/themeHandler.js" type="text/javascript"></script>
    <script src="scripts/colorChanger.js" type="text/javascript"></script>

</head>

<body>
    <nav class="navbar navbar-dark bg-dark fixed-top">
        <div class="container">
            <a href="index.html" class="navbar-brand">Tower Bootstrap Theme</a>

            <ul class="navbar-nav ms-auto flex-row gap-3">
                <li class="nav-item dropdown">
                    <button type="button" class="nav-link dropdown-toggle" data-bs-toggle="dropdown" aria-label="Color Changer">
                        <span id="current-color-theme"></span> <span class="d-none d-lg-inline">Primary Color</span>
                    </button>
                    <div class="dropdown-menu dropdown-menu-end position-absolute">
                        <button type="button" class="dropdown-item" data-color-theme-value="purple">
                            <span class="color-selector-preview" style="--twr-preview-color: #7540bf; "></span> Purple
                        </button>
                        <button type="button" class="dropdown-item" data-color-theme-value="default">
                            <span class="color-selector-preview" style="--twr-preview-color: #0068d8; "></span> Blue
                        </button>
                        <button type="button" class="dropdown-item" data-color-theme-value="cyan">
                            <span class="color-selector-preview" style="--twr-preview-color: #047878;"></span> Cyan
                        </button>
                        <button type="button" class="dropdown-item" data-color-theme-value="green">
                            <span class="color-selector-preview" style="--twr-preview-color: #198754;"></span> Green
                        </button>
                    </div>
                </li>
                <li class="nav-item dropdown">
                    <button type="button" class="nav-link dropdown-toggle" data-bs-toggle="dropdown" aria-label="Theme Changer">
                        <span id="current-theme"></span> <span class="d-none d-lg-inline">Switch Themes</span>
                    </button>
                    <div class="dropdown-menu dropdown-menu-end position-absolute">
                        <button type="button" class="dropdown-item" data-bs-theme-value="light">
                            <svg class="svg-icon" viewBox="0 0 24 24">
                                <path d="M8 12a4 4 0 1 0 8 0a4 4 0 1 0 -8 0" />
                                <path d="M3 12h1m8 -9v1m8 8h1m-9 8v1m-6.4 -15.4l.7 .7m12.1 -.7l-.7 .7m0 11.4l.7 .7m-12.1 -.7l-.7 .7" />
                            </svg>
                            Light
                        </button>
                        <button type="button" class="dropdown-item" data-bs-theme-value="dark">
                            <svg class="svg-icon" viewBox="0 0 24 24">
                                <path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454l0 .008" />
                            </svg>
                            Dark
                        </button>
                        <button type="button" class="dropdown-item" data-bs-theme-value="auto">
                            <svg class="svg-icon" viewBox="0 0 24 24">
                                <path d="M9.173 14.83a4 4 0 1 1 5.657 -5.657" />
                                <path d="M11.294 12.707l.174 .247a7.5 7.5 0 0 0 8.845 2.492a9 9 0 0 1 -14.671 2.914" />
                                <path d="M3 12h1" />
                                <path d="M12 3v1" />
                                <path d="M5.6 5.6l.7 .7" />
                                <path d="M3 21l18 -18" />
                            </svg>
                            Auto
                        </button>
                    </div>
                </li>
                <li class="nav-item">
                    <a href="https://github.com/StrutTower/tower-bootstrap-theme" rel="noreferrer noopener" class="nav-link" aria-label="View on GitHub">
                        <svg class="svg-icon" viewBox="0 0 24 24">
                            <path d="M9 19c-4.3 1.4 -4.3 -2.5 -6 -3m12 5v-3.5c0 -1 .1 -1.4 -.5 -2c2.8 -.3 5.5 -1.4 5.5 -6a4.6 4.6 0 0 0 -1.3 -3.2a4.2 4.2 0 0 0 -.1 -3.2s-1.1 -.3 -3.5 1.3a12.3 12.3 0 0 0 -6.2 0c-2.4 -1.6 -3.5 -1.3 -3.5 -1.3a4.2 4.2 0 0 0 -.1 3.2a4.6 4.6 0 0 0 -1.3 3.2c0 4.6 2.7 5.7 5.5 6c-.6 .6 -.6 1.2 -.5 2v3.5" />
                        </svg>
                        <span class="d-none d-lg-inline">GitHub</span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <main class="container mt-5 pt-2">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="index.html">Homepage</a></li>
            <li class="breadcrumb-item active">Badges and Progress Bars</li>
        </ol>


        <h2 class="display-4">Badges</h2>
        <hr />
        <p>
            <button type="button" class="btn btn-primary">
                Notifications <span class="badge bg-secondary">4</span>
            </button>
        </p>

        <p>
            <span class="badge text-bg-primary">Primary</span>
            <span class="badge text-bg-secondary">Secondary</span>
            <span class="badge text-bg-success">Success</span>
            <span class="badge text-bg-danger">Danger</span>
            <span class="badge text-bg-warning text-dark">Warning</span>
            <span class="badge text-bg-info">Info</span>
            <span class="badge text-bg-light text-dark">Light</span>
            <span class="badge text-bg-dark">Dark</span>
        </p>

        <p>
            <span class="badge rounded-pill bg-primary">Primary</span>
            <span class="badge rounded-pill bg-secondary">Secondary</span>
            <span class="badge rounded-pill bg-success">Success</span>
            <span class="badge rounded-pill bg-danger">Danger</span>
            <span class="badge rounded-pill bg-warning text-dark">Warning</span>
            <span class="badge rounded-pill bg-info">Info</span>
            <span class="badge rounded-pill bg-light text-dark">Light</span>
            <span class="badge rounded-pill bg-dark">Dark</span>
        </p>

        <br />
        <h2 class="display-4">Progress Bars</h2>
        <hr />
        <div class="mb-4">
            <h5>Standard</h5>
            <div class="progress mb-2">
                <div class="progress-bar" role="progressbar" style="width: 25%;" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100" aria-label="Default Progress Bar"></div>
            </div>
            <div class="progress mb-2">
                <div class="progress-bar bg-success" role="progressbar" style="width: 25%" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100" aria-label="Success Progress Bar"></div>
            </div>
            <div class="progress mb-2">
                <div class="progress-bar bg-info" role="progressbar" style="width: 50%" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100" aria-label="Info Progress Bar"></div>
            </div>
            <div class="progress mb-2">
                <div class="progress-bar bg-warning" role="progressbar" style="width: 75%" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100" aria-label="Warning Progress Bar"></div>
            </div>
            <div class="progress mb-2">
                <div class="progress-bar bg-danger" role="progressbar" style="width: 100%" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100" aria-label="Danger Progress Bar"></div>
            </div>
        </div>
        <div class="mb-4">
            <h5>Striped</h5>
            <div class="progress mb-2">
                <div class="progress-bar progress-bar-striped" role="progressbar" style="width: 10%" aria-valuenow="10" aria-valuemin="0" aria-valuemax="100" aria-label="Default Striped Progress Bar"></div>
            </div>
            <div class="progress mb-2">
                <div class="progress-bar progress-bar-striped bg-success" role="progressbar" style="width: 25%" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100" aria-label="Success Striped Progress Bar"></div>
            </div>
            <div class="progress mb-2">
                <div class="progress-bar progress-bar-striped bg-info" role="progressbar" style="width: 50%" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100" aria-label="Info Striped Progress Bar"></div>
            </div>
            <div class="progress mb-2">
                <div class="progress-bar progress-bar-striped bg-warning" role="progressbar" style="width: 75%" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100" aria-label="Warning Striped Progress Bar"></div>
            </div>
            <div class="progress mb-2">
                <div class="progress-bar progress-bar-striped bg-danger" role="progressbar" style="width: 100%" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100" aria-label="Danger Striped Progress Bar"></div>
            </div>
        </div>
        <div class="mb-4">
            <h5>Animated Stripes</h5>
            <div class="progress">
                <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100" style="width: 75%" aria-label="Default Animated Striped Progress Bar"></div>
            </div>
        </div>
    </main>

    <footer class="container">
        <hr />
        <p>Tower</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <!--<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="scripts/scripts.js"></script>
</body>

</html>
