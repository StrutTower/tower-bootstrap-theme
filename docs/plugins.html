<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://unpkg.com/slim-select@latest/dist/slimselect.css" rel="stylesheet">
    <title>Plugins | Tower Bootstrap Theme</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Demo of custom Bootstrap theme">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.3.67/css/materialdesignicons.min.css" rel="stylesheet" />
    <link href="css/tower-bootstrap-theme.min.css" rel="stylesheet" id="theme-link" />
    <style>
        .color-selector-preview {
            background: var(--twr-preview-color);
            display: inline-block;
            height: 1.25em;
            width: 1.25em;
            border-radius: .25em;
            border: 2px solid hsl(from var(--twr-preview-color) h s calc(l - 10));
            transform: translateY(2px);
        }

        .svg-icon {
            text-decoration: none;
            width: 1.2em;
            height1.2em;
            line-height: 0.75em;
            margin: -0.15em 0.1em 0 0.1em;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
    <script src="scripts/themeHandler.js" type="text/javascript"></script>
    <script src="scripts/colorChanger.js" type="text/javascript"></script>

</head>

<body>
    <nav class="navbar navbar-dark bg-dark fixed-top">
        <div class="container">
            <a href="index.html" class="navbar-brand">Tower Bootstrap Theme</a>

            <ul class="navbar-nav ms-auto flex-row gap-3">
                <li class="nav-item dropdown">
                    <button type="button" class="nav-link dropdown-toggle" data-bs-toggle="dropdown" aria-label="Color Changer">
                        <span id="current-color-theme"></span> <span class="d-none d-lg-inline">Primary Color</span>
                    </button>
                    <div class="dropdown-menu dropdown-menu-end position-absolute">
                        <button type="button" class="dropdown-item" data-color-theme-value="purple">
                            <span class="color-selector-preview" style="--twr-preview-color: #7540bf; "></span> Purple
                        </button>
                        <button type="button" class="dropdown-item" data-color-theme-value="default">
                            <span class="color-selector-preview" style="--twr-preview-color: #0068d8; "></span> Blue
                        </button>
                        <button type="button" class="dropdown-item" data-color-theme-value="cyan">
                            <span class="color-selector-preview" style="--twr-preview-color: #047878;"></span> Cyan
                        </button>
                        <button type="button" class="dropdown-item" data-color-theme-value="green">
                            <span class="color-selector-preview" style="--twr-preview-color: #198754;"></span> Green
                        </button>
                    </div>
                </li>
                <li class="nav-item dropdown">
                    <button type="button" class="nav-link dropdown-toggle" data-bs-toggle="dropdown" aria-label="Theme Changer">
                        <span id="current-theme"></span> <span class="d-none d-lg-inline">Switch Themes</span>
                    </button>
                    <div class="dropdown-menu dropdown-menu-end position-absolute">
                        <button type="button" class="dropdown-item" data-bs-theme-value="light">
                            <span class="mdi mdi-weather-sunny"></span>
                            Light
                        </button>
                        <button type="button" class="dropdown-item" data-bs-theme-value="dark">
                            <span class="mdi mdi-weather-night"></span>
                            Dark
                        </button>
                        <button type="button" class="dropdown-item" data-bs-theme-value="auto">
                            <span class="mdi mdi-theme-light-dark"></span>
                            Auto
                        </button>
                    </div>
                </li>
                <li class="nav-item">
                    <a href="https://github.com/StrutTower/tower-bootstrap-theme" rel="noreferrer noopener" class="nav-link" aria-label="View on GitHub">
                        <svg class="svg-icon" viewBox="0 0 24 24">
                            <path d="M9 19c-4.3 1.4 -4.3 -2.5 -6 -3m12 5v-3.5c0 -1 .1 -1.4 -.5 -2c2.8 -.3 5.5 -1.4 5.5 -6a4.6 4.6 0 0 0 -1.3 -3.2a4.2 4.2 0 0 0 -.1 -3.2s-1.1 -.3 -3.5 1.3a12.3 12.3 0 0 0 -6.2 0c-2.4 -1.6 -3.5 -1.3 -3.5 -1.3a4.2 4.2 0 0 0 -.1 3.2a4.6 4.6 0 0 0 -1.3 3.2c0 4.6 2.7 5.7 5.5 6c-.6 .6 -.6 1.2 -.5 2v3.5" />
                        </svg>
                        <span class="d-none d-lg-inline">GitHub</span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <main class="container mt-5 pt-2">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="index.html">Homepage</a></li>
            <li class="breadcrumb-item active">Plugins</li>
        </ol>

        <h2 class="display-5">Plugin Styles</h2>
        <p class="text-muted">The following are JavaScript plugins that have support in this theme.</p>
        <hr />

        <div class="mb-3">
            <h3>Slim Select <span class="h5"><a href="https://slimselectjs.com/" target="_blank" rel="noopener noreferrer" class="small">https://slimselectjs.com/</a></span></h3>

            <div class="mb-3">
                <label>Single Select List</label>
                <select class="slim-select-test">
                    <option value="1">Option 1</option>
                    <option value="2">Option 2</option>
                    <option value="3">Option 3</option>
                    <option value="4">Option 4</option>
                    <option value="5">Option 5</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Multiple Select List</label>
                <select class="slim-select-test" multiple>
                    <option value="1">Option 1</option>
                    <option value="2">Option 2</option>
                    <option value="3">Option 3</option>
                    <option value="4">Option 4</option>
                    <option value="5">Option 5</option>
                </select>
            </div>
        </div>

        <br />
        <br />
        <br />
    </main>

    <footer class="container">
        <hr />
        <p>Tower</p>
    </footer>
    <script src="https://unpkg.com/slim-select@latest/dist/slimselect.js"></script>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <!--<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="scripts/scripts.js"></script>
</body>

</html>
