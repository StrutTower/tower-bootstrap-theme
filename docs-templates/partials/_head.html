<style>
    .color-selector-preview {
        background: var(--twr-preview-color);

        border-radius: .25em;
        border: 2px solid hsl(from var(--twr-preview-color) h s calc(l - 10));

    }

        text-decoration:none;
        width:1.2em;
        height1.2em;
        line-height:0.75em;
        margin: -0.15em 0.1em 0 0.1em;

        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
    }
